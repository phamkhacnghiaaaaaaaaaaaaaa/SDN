<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      .card {
        border: 1px solid #ccc;
        padding: 20px;
        margin: 10px;
        width: 250px;
        display: inline-block;
      }

      h2 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <h1>Library Dashboard</h1>

    <div class="card">
      <h2>Categories</h2>
      <p id="categoryCount">0</p>
    </div>

    <div class="card">
      <h2>Likes</h2>
      <p id="likeCount">0</p>
    </div>

    <div class="card">
      <h2>Available Books</h2>
      <p id="availableCount">0</p>
    </div>

    <h2>Category List</h2>

    <ul id="categoryList"></ul>

    <script src="dashboard.js"></script>
  </body>
</html>
